# Build spend-server (combined nullifier + witness PIR) for all platforms
# and publish a GitHub Release on version tags.
#
# Release assets:
#   spend-server-linux-amd64, spend-server-linux-arm64,
#   spend-server-darwin-arm64,
#   spend-server.service
#
# Note: darwin-amd64 is not supported because spend-server requires the ypir
# feature (which builds C++ with -march=native) and cannot be cross-compiled.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build spend-server (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-latest
            platform: darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-03-15

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.platform }}-spend-server-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform }}-spend-server-

      - name: Build release binary
        run: cargo build --release -p combined-server --features ypir

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spend-server-${{ matrix.platform }}
          path: target/release/spend-server

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: spend-server-*

      - name: Prepare release assets
        run: |
          for PLATFORM in linux-amd64 linux-arm64 darwin-arm64; do
            cp "spend-server-${PLATFORM}/spend-server" "spend-server-${PLATFORM}.tmp"
            rm -rf "spend-server-${PLATFORM}"
            mv "spend-server-${PLATFORM}.tmp" "spend-server-${PLATFORM}"
            chmod +x "spend-server-${PLATFORM}"
          done
          cp docs/spend-server.service .

      - name: Create release with assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            spend-server-linux-amd64
            spend-server-linux-arm64
            spend-server-darwin-arm64
            spend-server.service

  distribute:
    name: Distribute to DigitalOcean Spaces
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: spend-server-*

      - name: Upload to DigitalOcean Spaces
        if: ${{ env.DO_ACCESS_KEY != '' }}
        continue-on-error: true
        env:
          DO_ACCESS_KEY: ${{ secrets.DO_ACCESS_KEY }}
          DO_SECRET_KEY: ${{ secrets.DO_SECRET_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          pip install --quiet s3cmd
          cat > /tmp/do-spaces.s3cfg <<EOF
          [default]
          access_key = ${DO_ACCESS_KEY}
          secret_key = ${DO_SECRET_KEY}
          host_base = fra1.digitaloceanspaces.com
          host_bucket = %(bucket)s.fra1.digitaloceanspaces.com
          bucket_location = fra1
          use_https = True
          EOF
          for PLATFORM in linux-amd64 linux-arm64 darwin-arm64; do
            BINARY="spend-server-${PLATFORM}/spend-server"
            if [ -f "$BINARY" ]; then
              s3cmd -c /tmp/do-spaces.s3cfg put "$BINARY" \
                "s3://wallet-sync/spend-server-${VERSION}-${PLATFORM}" --acl-public --force
            fi
          done
