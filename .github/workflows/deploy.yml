# Deploy spend-server to a remote host on every push to main.
# Requires repository secrets: DEPLOY_HOST, DEPLOY_USER, SSH_PASSWORD.
# See docs/deploy-setup.md for one-time remote setup.

name: Deploy spend-server

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/spend-server

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly-2025-03-15

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-spend-server-nightly-2025-03-15-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-spend-server-nightly-2025-03-15-

      - name: Build release binary
        run: cargo build --release -p spend-server --features ypir

      - name: Upload binary and config
        uses: actions/upload-artifact@v4
        with:
          name: spend-server-binaries
          path: |
            target/release/spend-server
            docs/spend-server.service

  deploy:
    name: Deploy to remote
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: spend-server-binaries

      - name: Flatten artifacts
        run: |
          cp target/release/spend-server /tmp/spend-server
          cp docs/spend-server.service /tmp/spend-server.service
          rm -rf target docs
          mv /tmp/spend-server /tmp/spend-server.service .

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "spend-server,spend-server.service"
          target: ${{ env.DEPLOY_PATH }}

      - name: Install config and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            sudo chmod +x /opt/spend-server/spend-server
            sudo cp /opt/spend-server/spend-server.service /etc/systemd/system/spend-server.service
            sudo systemctl daemon-reload
            sudo systemctl enable spend-server
            sudo systemctl restart spend-server
